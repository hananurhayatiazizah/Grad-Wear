<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebaya - GradWear.id</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <div class="header">
        <div class="header-left">
            <span class="menu-icon" onclick="window.location.href='home.html'" style="font-size: 30px; cursor: pointer;">☰</span>
        </div>
        <div class="header-center">
            <img src="logo_GradWear (Remove BackGround).png" class="main-logo" onclick="window.location.href='home.html'">
        </div>
        <div class="header-right">
            <div class="icons">
                <img src="search 2.png" class="header-icon" onclick="window.location.href='search.html'">
                <img src="shopping-cart.png" class="header-icon">
                <img src="user.png" class="header-icon" onclick="window.location.href='login.html'">
            </div>
        </div>
    </div>

    <div class="content">
        <h2 style="text-align: center; color: #6b4b4b; margin: 20px 0;">Kebaya</h2>

        <div class="product-grid">
            <!-- Produk 1: shys.rental -->
            <div class="product-card">
                <div class="image-container-triple">
                    <div class="img-box">
                        <img src="shys kebaya 1.jpg" alt="shys 1">
                    </div>
                    <div class="img-box">
                        <img src="shys kebaya 2.jpeg" alt="shys 2">
                    </div>
                    <div class="img-box">
                        <img src="shys kebaya 3 baru.jpg" alt="shys 3">
                    </div>
                </div>
                <div class="product-info">
                    <h3>Kebaya by Shys Rent Kebaya</h3>
                    <p class="price">Rp. 500.000</p>
                    <button class="btn-detail" onclick="window.location.href='detail_paket.html'">Lihat Detail</button>
                </div>
            </div>

            <!-- Produk 2: ccdressrent -->
            <div class="product-card">
                <div class="image-container-triple">
                    <div class="img-box">
                        <img src="ccdressrent kebaya 1.jpeg" alt="cc 1"> <!-- Ganti nama file foto di sini -->
                    </div>
                    <div class="img-box">
                        <img src="ccdress kebaya 2.jpeg" alt="cc 2"> <!-- Ganti nama file foto di sini -->
                    </div>
                    <div class="img-box">
                        <img src="ccdress kebaya 3.jpeg" alt="cc 3"> <!-- Ganti nama file foto di sini -->
                    </div>
                </div>
                <div class="product-info">
                    <h3>Kebaya by Ccdressrent</h3>
                    <p class="price">Rp. 600.000</p>
                    <button class="btn-detail">Lihat Detail</button>
                </div>
            </div>

            <!-- Produk 3: aan.kebaya -->
            <div class="product-card">
                <div class="image-container-triple">
                    <div class="img-box">
                        <img src="aan kebaya 1.jpeg" alt="aan 1"> <!-- Ganti nama file foto di sini -->
                    </div>
                    <div class="img-box">
                        <img src="aan kebaya 2.jpeg" alt="aan 2"> <!-- Ganti nama file foto di sini -->
                    </div>
                    <div class="img-box">
                        <img src="aan kebaya 3.jpeg" alt="aan 3"> <!-- Ganti nama file foto di sini -->
                    </div>
                </div>
                <div class="product-info">
                    <h3>Kebaya by Aan Kebaya</h3>
                    <p class="price">Rp. 550.000</p>
                    <button class="btn-detail">Lihat Detail</button>
                </div>
            </div>
        </div>
