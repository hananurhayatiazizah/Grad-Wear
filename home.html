<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - GradWear.id</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <!-- SIDEBAR -->
    <div id="sideMenu" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="menu-content">
            <a href="home.html">Home</a>
            <a href="paket_wisuda.html">Paket Wisuda</a>
            <a href="kebaya.html">Kebaya</a>
            <a href="make-up.html">Make-Up Artist</a>
            <a href="photoshoot.html">Photoshoot</a>
            <a href="tentang_kami.html">Tentang Kami</a>
            <a href="keranjang.html">Lihat Pesanan</a>
        </div>
    </div>

    <!-- HEADER (Sudah Diperbaiki: Logo Merapat ke Kiri) -->
    <div class="header">
        <div class="header-left">
            <span class="menu-icon" onclick="openNav()">☰</span>
            <img src="logo_GradWear (Remove BackGround).png" class="main-logo" onclick="window.location.href='home.html'">
        </div>

        <div class="header-center">
            <div class="search-container">
                <img src="search 2.png" class="search-icon-inside" id="searchBtn">
                <input type="text" placeholder="Search" class="search-input" id="searchInput">
            </div>
        </div>

        <div class="header-right">
            <div class="auth-buttons">
                <a href="login.html" class="btn-login">Login</a>
                <a href="profile_user.html" class="btn-profile">Profile</a>
            </div>
        </div>
    </div>

    <!-- KONTEN UTAMA -->
    <div class="home">
        <div class="hero">
            <img src="foto background home (orang wisuda).jpeg" alt="wisuda">
        </div>

        <div style="text-align: center;">
            <button class="booking">Booking Sekarang</button>
        </div>

        <div class="menu-grid">
            <div class="card" onclick="window.location.href='paket_wisuda.html'">Paket Wisuda</div>
            <div class="card" onclick="window.location.href='kebaya.html'">Sewa Kebaya</div>
            <div class="card" onclick="window.location.href='make-up.html'">Make-Up Artist</div>
            <div class="card" onclick="window.location.href='photoshoot.html'">Photoshoot</div>
        </div>
    </div>

    <script>
    // --- 1. FUNGSI SIDEBAR ---
    function openNav() {
        const sideMenu = document.getElementById("sideMenu");
        if (sideMenu) sideMenu.style.width = "250px";
    }

    function closeNav() {
        const sideMenu = document.getElementById("sideMenu");
        if (sideMenu) sideMenu.style.width = "0";
    }

    // --- 2. LOGIKA PENCARIAN (Sudah Difix) ---
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    function performSearch() {
        const keyword = searchInput.value.trim();
        if (keyword !== "") {
            window.location.href = "search.html?q=" + encodeURIComponent(keyword);
        }
    }

    if (searchInput) {
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    }

    if (searchBtn) {
        searchBtn.style.cursor = "pointer";
        searchBtn.onclick = performSearch;
    }

    // --- 3. LOGIKA TOMBOL BOOKING ---
    const bookingBtn = document.querySelector('.booking');
    if (bookingBtn) {
        bookingBtn.onclick = function() {
            const statusLogin = localStorage.getItem("isLoggedIn");
            if (statusLogin === "true") {
                window.location.href = "sewa_layanan.html"; 
            } else {
                alert("Ups! Kamu harus login dulu untuk booking.");
                window.location.href = "login.html";
            }
        };
    }
    </script>
</body>
</html>
